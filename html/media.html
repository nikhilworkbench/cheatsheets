<!-- IMAGE ATTRIBUTE -->
<img src="image.jpg" alt="Description" width="300" height="200">

<!-- AUDIO TAG -->
<audio controls>
  <source src="audio.mp3" type="audio/mpeg">
</audio>

<!-- VIDEO TAG -->
<video width="480" height="320" controls>
  <source src="video.mp4" type="video/mp4">
</video>

<!-- IFRAME EMBEDDING TAG -->
<iframe src="https://www.example.com" width="600" height="400"></iframe>

<!-- FIGURE AND FIGCAPTION -->
<figure>
  <p> Groups various diagrams, images, illustrations, and code snippets into the document </p>
  <img src="https://media.geeksforgeeks.org/wp-content/uploads/geeks-25.png" width="304" height="228" alt="The Pulpit Rock">
  <figcaption>Figure Caption goes here </figcaption>
</figure>

<!-- OBJECT TAG -->
<object data="https://media.geeksforgeeks.org/wp-content/cdn-uploads/Geek_logi_-low_res.png" width="550px" height="150px">
  <p> Includes objects, such as images, audio, videos, and Portable Document Format (PDF) on a Web page </p>
</object>

<!-- EMBED TAG -->
<embed> Embeds multimedia on a Web page </embed>
